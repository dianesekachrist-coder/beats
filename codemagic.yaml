workflows:
  android-release:
    name: Aura Music – Android Release
    max_build_duration: 60
    environment:
      flutter: 3.22.2 # pin to latest stable
      java: 17
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Analyze
        script: flutter analyze --no-fatal-infos
      - name: Unit tests
        script: flutter test
      - name: Build APK
        script: |
          flutter build apk --release \
            --dart-define=FLUTTER_BUILD_NAME=$PROJECT_BUILD_NUMBER \
            --dart-define=FLUTTER_BUILD_NUMBER=$PROJECT_BUILD_NUMBER
    artifacts:
      - build/app/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - dianesekachrist@gmail.com
        notify:
          success: true
          failure: true
